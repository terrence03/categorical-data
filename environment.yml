name: categorical-data         # 環境名稱
channels:
  - conda-forge              # 建議優先使用 conda-forge，套件最齊全
  - defaults
dependencies:
  - python=3.14              # 指定 Python 版本
  - r-base                   # 指定 R 語言版本
  - r-tidyverse              # R 的常用套件組合
  - r-rmarkdown              # 編譯 .Rmd 檔案
  - r-knitr                  # 執行 Rmd 程式碼區塊
  - r-tinytex                # PDF 輸出所需的 LaTeX 管理工具
  - r-proc                   # ROC 曲線分析
  - r-irkernel               # R 的 Jupyter kernel，讓 Jupyter Notebook 支援 R 語言
  - jupyter                  # Jupyter 核心，IRkernel::installspec() 需要
  - pandoc                   # 文件轉換工具，Rmd 編譯成 HTML/PDF 需要
  - pandas                   # Python 套件（優先從 conda 下載）
  - scikit-learn
  - fastapi
  - uvicorn
  - statsmodels
  - matplotlib
